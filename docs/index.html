<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>きもちの絵本</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-live="polite">
      <section class="screen screen-title is-active" id="title-screen">
        <div class="sky-picture" aria-hidden="true">
          <div class="paper-sun"></div>
          <div class="paper-hill hill-left"></div>
          <div class="paper-hill hill-right"></div>
          <div class="tiny-house">
            <span class="roof"></span>
            <span class="wall"></span>
          </div>
        </div>

        <div class="title-copy">
          <p class="eyebrow">feelings picturebook</p>
          <h1>きもちの絵本</h1>
          <p class="subtitle">いまの きもちに、そっと ものがたりを</p>
          <p class="version-badge" data-version-badge></p>
        </div>

        <button class="primary-button" type="button" data-start>はじめる</button>
      </section>

      <section class="screen" id="name-screen">
        <header class="screen-header">
          <p class="step-label">Prologue</p>
          <h2>きょうの しゅじんこうの なまえは？</h2>
          <p class="screen-note">ものがたりの 中では、えらんだ よびかたで 出てきます。</p>
        </header>

        <div class="name-card">
          <label class="field-label" for="hero-name">なまえを いれてね</label>
          <input
            class="name-input"
            id="hero-name"
            type="text"
            inputmode="text"
            maxlength="16"
            placeholder="例：ねこ"
            autocomplete="off"
          />

          <fieldset class="suffix-field">
            <legend>よびかた</legend>
            <div class="suffix-options">
              <label><input type="radio" name="suffix" value="ちゃん" checked />ちゃん</label>
              <label><input type="radio" name="suffix" value="くん" />くん</label>
              <label><input type="radio" name="suffix" value="さん" />さん</label>
              <label><input type="radio" name="suffix" value="" />よびすて</label>
            </div>
          </fieldset>

          <p class="name-preview" id="name-preview">しゅじんこうとして ものがたりに 出てきます</p>
        </div>

        <button class="primary-button" type="button" data-name-next>つぎへ</button>
        <button class="quiet-button" type="button" data-back="title-screen">もどる</button>
      </section>

      <section class="screen" id="emotion-screen">
        <header class="screen-header">
          <p class="step-label">R: Raw Emotion</p>
          <h2>まず、いまの きもちを そのまま えらんでね</h2>
          <p class="screen-note">どの きもちも、ここにいていいものとして えらべます。</p>
        </header>
        <div class="choice-list" id="emotion-list"></div>
      </section>

      <section class="screen" id="detail-screen">
        <header class="screen-header">
          <p class="step-label">L: Labeling</p>
          <h2 id="detail-title">その きもちの おくにありそうなものは？</h2>
        </header>
        <div class="choice-list" id="detail-list"></div>
        <button class="primary-button" type="button" data-create-story disabled>
          おくの きもちを えらんでね
        </button>
        <button class="quiet-button" type="button" data-back="emotion-screen">もどる</button>
      </section>

      <section class="screen" id="story-screen">
        <article class="story-card">
          <div class="story-illustration" id="story-illustration" aria-hidden="true"></div>
          <p class="story-kicker">きみのための 小さな おはなし</p>
          <h2 id="story-title"></h2>
          <div class="story-text" id="story-text"></div>
          <div class="perspective-box" id="perspective-box"></div>
          <div class="compass-box" id="compass-box"></div>
        </article>
        <button class="primary-button" type="button" data-reset>さいしょから</button>
      </section>
    </main>

    <script src="script.js"></script>
    <script>
      (() => {
        const startButton = document.querySelector("[data-start]");
        const nameScreen = document.querySelector("#name-screen");
        const appShell = document.querySelector(".phone-shell");

        if (!startButton || !nameScreen) return;

        startButton.addEventListener("click", () => {
          document.querySelectorAll(".screen").forEach((screen) => {
            screen.classList.toggle("is-active", screen === nameScreen);
          });
          if (appShell) appShell.scrollTop = 0;
        });
      })();
    </script>
  </body>
</html>
