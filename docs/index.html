<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>きもちの絵本</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-live="polite">
      <section class="screen screen-title is-active" id="title-screen">
        <div class="sky-picture" aria-hidden="true">
          <div class="paper-sun"></div>
          <div class="paper-hill hill-left"></div>
          <div class="paper-hill hill-right"></div>
          <div class="tiny-house">
            <span class="roof"></span>
            <span class="wall"></span>
          </div>
        </div>

        <div class="title-copy">
          <p class="eyebrow">feelings picturebook</p>
          <h1>きもちの絵本</h1>
          <p class="subtitle">いまの気持ちに、そっと物語を</p>
          <p class="version-badge">version v0.5.0 / 2026-07-07</p>
        </div>

        <button class="primary-button" type="button" data-start>はじめる</button>
      </section>

      <section class="screen" id="name-screen">
        <header class="screen-header">
          <p class="step-label">Prologue</p>
          <h2>きょうの主人公の名前は？</h2>
          <p class="screen-note">物語の中では、選んだ呼び方で登場します。</p>
        </header>

        <div class="name-card">
          <label class="field-label" for="hero-name">名前をいれてね</label>
          <input
            class="name-input"
            id="hero-name"
            type="text"
            inputmode="text"
            maxlength="16"
            placeholder="例：ねこ"
            autocomplete="off"
          />

          <fieldset class="suffix-field">
            <legend>呼び方</legend>
            <div class="suffix-options">
              <label><input type="radio" name="suffix" value="ちゃん" checked />ちゃん</label>
              <label><input type="radio" name="suffix" value="くん" />くん</label>
              <label><input type="radio" name="suffix" value="さん" />さん</label>
              <label><input type="radio" name="suffix" value="" />呼び捨て</label>
            </div>
          </fieldset>

          <p class="name-preview" id="name-preview">あなたちゃんとして物語に出てきます</p>
        </div>

        <button class="primary-button" type="button" data-name-next>つぎへ</button>
        <button class="quiet-button" type="button" data-back="title-screen">もどる</button>
      </section>

      <section class="screen" id="emotion-screen">
        <header class="screen-header">
          <p class="step-label">R: Raw Emotion</p>
          <h2>まず、いまの気持ちをそのまま選んでね</h2>
          <p class="screen-note">どの気持ちも、ここにいていいものとして選べます。</p>
        </header>
        <div class="choice-list" id="emotion-list"></div>
      </section>

      <section class="screen" id="detail-screen">
        <header class="screen-header">
          <p class="step-label">L: Labeling</p>
          <h2 id="detail-title">その気持ちの奥にありそうなものは？</h2>
        </header>
        <div class="choice-list" id="detail-list"></div>
        <button class="quiet-button" type="button" data-back="emotion-screen">もどる</button>
      </section>

      <section class="screen" id="scene-screen">
        <header class="screen-header">
          <p class="step-label">T: Translation</p>
          <h2>その気持ちを、どんな景色に翻訳する？</h2>
        </header>
        <div class="choice-list" id="scene-list"></div>
        <button class="quiet-button" type="button" data-back="detail-screen">もどる</button>
      </section>

      <section class="screen" id="story-screen">
        <article class="story-card">
          <div class="story-illustration" id="story-illustration" aria-hidden="true"></div>
          <p class="story-kicker">あなたのための小さなお話</p>
          <h2 id="story-title"></h2>
          <div class="story-text" id="story-text"></div>
          <div class="perspective-box" id="perspective-box"></div>
          <div class="compass-box" id="compass-box"></div>
        </article>
        <button class="primary-button" type="button" data-reset>もう一度えらぶ</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
